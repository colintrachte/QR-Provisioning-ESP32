<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Setup</title>
  <link rel="stylesheet" href="/setup.css">
</head>
<body>
  <div class="card">
    <div class="logo">&#128246;</div>
    <h1>WiFi Setup</h1>
    <p class="subtitle">Connect this device to your network</p>

    <p class="section-label">
      Available networks
      <button class="rescan-btn" id="rescan-btn">&#8635; Rescan</button>
    </p>
    <div id="network-list">
      <p class="scan-status">Scanning&hellip;</p>
    </div>

    <form id="setup-form">
      <label for="ssid">Network name</label>
      <input type="text" id="ssid" name="ssid"
             placeholder="Or type manually"
             autocomplete="off" autocorrect="off"
             autocapitalize="none" spellcheck="false"
             required>

      <label for="pass">Password</label>
      <div class="pass-wrap">
        <input type="password" id="pass" name="pass"
               placeholder="Leave blank if open network"
               autocomplete="current-password">
        <button type="button" class="toggle-pass" aria-label="Show/hide password">&#128065;</button>
      </div>

      <button type="submit" id="submit-btn">Save &amp; Connect</button>
      <p class="status" id="status"></p>
    </form>

    <div class="skip-wrap">
      <span class="skip-label">Already connected?</span>
      <a id="skip-btn" class="skip-link" href="#">Test robot now &rarr;</a>
    </div>

    <p class="hint">
      After saving, the device will reboot and join your network.<br>
      To reconfigure: hold BOOT 3&nbsp;s at power-up.
    </p>
  </div>
  <script src="/setup.js"></script>
</body>
</html>
