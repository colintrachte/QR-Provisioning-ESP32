<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title id="page-title">Robot</title>
    <meta name="theme-color" content="#0f1117">
    <link rel="preload" href="/base.css" as="style">
    <link rel="preload" href="/index.css" as="style">
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/index.css">
</head>

<body>

    <!-- Slide-in menu overlay + drawer -->
    <div id="menu-overlay" class="menu-overlay" aria-hidden="true"></div>
    <nav id="menu-drawer" class="menu-drawer" aria-label="Main menu">
        <div class="menu-header">
            <span id="menu-device-name" class="menu-device-name">Robot</span>
            <button id="menu-close" class="menu-close" aria-label="Close menu">&#10005;</button>
        </div>
        <ul class="menu-list">
            <li><a href="/settings" class="menu-item">&#9881;&nbsp; Settings</a></li>
            <li><button id="menu-reboot" class="menu-item menu-item-btn">&#8635;&nbsp; Reboot</button></li>
        </ul>
    </nav>

    <div class="shell" id="shell">

        <header>
            <button id="menu-btn" class="menu-btn" aria-label="Open menu" aria-expanded="false">
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
                <span class="hamburger-bar"></span>
            </button>
            <h1 id="device-name">Robot</h1>
            <div class="header-right">
                <button id="arm-btn" class="arm-btn disarmed" aria-label="Arm or disarm robot">
                    <span class="arm-dot"></span>
                    <span class="arm-label">DISARMED</span>
                </button>
                <div id="conn-badge" class="conn-badge disconnected">
                    <span class="conn-dot"></span>
                    <span class="conn-label">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- System telemetry bar: signal · battery · temp -->
        <div class="sys-bar">

            <div class="sys-stat" id="rssi-stat" title="WiFi signal">
                <div class="rssi-bars" id="rssi-bars" aria-label="Signal strength">
                    <div class="rssi-bar" id="rssi-b1"></div>
                    <div class="rssi-bar" id="rssi-b2"></div>
                    <div class="rssi-bar" id="rssi-b3"></div>
                    <div class="rssi-bar" id="rssi-b4"></div>
                </div>
                <span class="sys-val" id="rssi-val">—</span>
            </div>

            <div class="sys-stat" id="batt-stat" title="Battery">
                <div class="batt-icon" aria-hidden="true">
                    <div class="batt-body">
                        <div class="batt-fill" id="batt-fill"></div>
                    </div>
                    <div class="batt-tip"></div>
                </div>
                <span class="sys-val" id="batt-val">—</span>
            </div>

            <div class="sys-stat" id="temp-stat" title="CPU temperature">
                <span class="sys-label">°C</span>
                <span class="sys-val" id="temp-val">—</span>
            </div>

        </div>

        <!-- Motor bars: driven locally from joystick axes -->
        <section class="telemetry-grid">
            <div class="track-card" id="card-left">
                <span class="track-label">Left</span>
                <div class="speed-bar-track">
                    <div class="speed-bar" id="bar-left"></div>
                </div>
            </div>
            <div class="track-card" id="card-right">
                <span class="track-label">Right</span>
                <div class="speed-bar-track">
                    <div class="speed-bar" id="bar-right"></div>
                </div>
            </div>
        </section>

        <!-- Touch joystick -->
        <section class="joystick-section" id="joystick-section">
            <div id="joystick-zone">
                <div id="joystick-knob"></div>
            </div>
            <p class="key-hint">Drag to drive · WASD on keyboard</p>
        </section>

        <!-- Diagnostics drawer (below joystick — thumb-safe) -->
        <details class="diag-drawer" id="diag-drawer">
            <summary class="diag-summary">Diagnostics</summary>
            <div class="diag-grid">
                <div class="ext-card">
                    <span class="ext-label">Uptime</span>
                    <span class="ext-val" id="uptime-val">—</span>
                </div>
                <div class="ext-card">
                    <span class="ext-label">Heap free</span>
                    <span class="ext-val" id="heap-val">—</span>
                </div>
                <div class="ext-card">
                    <span class="ext-label">Latency</span>
                    <span class="ext-val" id="latency-val">—</span>
                </div>
                <div class="ext-card">
                    <span class="ext-label">Errors</span>
                    <span class="ext-val" id="err-val">0</span>
                </div>
            </div>
        </details>

    </div>
    <script src="/index.js" defer></script>
</body>

</html>
