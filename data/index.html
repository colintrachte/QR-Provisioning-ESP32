<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mule Robot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="shell" id="shell">

    <header>
      <h1>Mule Robot</h1>
      <div class="header-right">
        <button id="arm-btn" class="arm-btn disarmed" aria-label="Arm or disarm robot">
          <span class="arm-dot"></span>
          <span class="arm-label">DISARMED</span>
        </button>
        <div id="conn-badge" class="conn-badge disconnected">
          <span class="conn-dot"></span>
          <span class="conn-label">Disconnected</span>
        </div>
      </div>
    </header>

    <!-- System telemetry bar: signal · battery · temp · latency -->
    <div class="sys-bar">
      <div class="sys-stat" id="rssi-stat">
        <span class="sys-icon">📶</span>
        <span class="sys-label">Signal</span>
        <span class="sys-val" id="rssi-val">—</span>
      </div>
      <div class="sys-stat" id="batt-stat">
        <span class="sys-icon">🔋</span>
        <span class="sys-label">Battery</span>
        <span class="sys-val" id="batt-val">—</span>
      </div>
      <div class="sys-stat">
        <span class="sys-icon">🌡</span>
        <span class="sys-label">Temp</span>
        <span class="sys-val" id="temp-val">—</span>
      </div>
      <div class="sys-stat">
        <span class="sys-icon">⏱</span>
        <span class="sys-label">Latency</span>
        <span class="sys-val" id="latency-val">—</span>
      </div>
      <button id="mode-btn" class="mode-btn" title="Switch input mode">
        <span id="mode-label">⌨ PC</span>
      </button>
    </div>

    <!-- Touch joystick (hidden in PC mode) -->
    <section class="joystick-section" id="joystick-section">
      <div id="joystick-zone">
        <div id="joystick-knob"></div>
      </div>
      <p class="key-hint">Drag to drive · WASD on keyboard</p>
    </section>

    <!-- Track telemetry: driven locally from joystick axes, not from firmware -->
    <section class="telemetry-grid">
      <div class="track-card" id="card-left">
        <h2 class="track-label">Left</h2>
        <div class="speed-bar-track">
          <div class="speed-bar" id="bar-left"></div>
        </div>
        <span class="speed-value" id="speed-left">0%</span>
        <span class="drive-state" id="state-left">STOPPED</span>
        <span class="drive-dir"   id="dir-left">—</span>
      </div>
      <div class="track-card" id="card-right">
        <h2 class="track-label">Right</h2>
        <div class="speed-bar-track">
          <div class="speed-bar" id="bar-right"></div>
        </div>
        <span class="speed-value" id="speed-right">0%</span>
        <span class="drive-state" id="state-right">STOPPED</span>
        <span class="drive-dir"   id="dir-right">—</span>
      </div>
    </section>

    <!-- Diagnostics drawer: uptime + heap, hidden by default -->
    <details class="diag-drawer" id="diag-drawer">
      <summary class="diag-summary">Diagnostics</summary>
      <div class="diag-grid">
        <div class="ext-card">
          <span class="ext-label">Uptime</span>
          <span class="ext-val" id="uptime-val">—</span>
        </div>
        <div class="ext-card">
          <span class="ext-label">Heap free</span>
          <span class="ext-val" id="heap-val">—</span>
        </div>
        <div class="ext-card">
          <span class="ext-label">Errors</span>
          <span class="ext-val" id="err-val">0</span>
        </div>
      </div>
    </details>

  </div>
  <script src="/script.js"></script>
</body>
</html>
