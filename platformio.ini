; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Environments
;   robot_esp32     Heltec WiFi LoRa 32 V3 (ESP32-S3) — ESP-IDF 5.x
;   ttgo_lora32_v1  TTGO LoRa32 V1 (ESP32)             — ESP-IDF 5.x
;   d1_mini         Wemos D1 Mini (ESP8266)             — Arduino framework

[platformio]
default_envs = robot_esp32
data_dir = data

; ── ESP32-S3 (Heltec WiFi LoRa 32 V3) ───────────────────────────────────────

[env]
platform = espressif32@^6.13.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -Werror=deprecated-declarations
    -Wno-error=return-type
    -DCORE_DEBUG_LEVEL=3
    -I boards
board_build.embed_txtfiles =
    data/index.html.gz
    data/index.js.gz
    data/index.css.gz
    data/base.css.gz
    data/settings.html.gz
    data/settings.js.gz
    data/settings.css.gz
    data/favicon.svg.gz
    data/setup.html.gz
    data/setup.css.gz
    data/setup.js.gz

[env:robot_esp32]
board = heltec_wifi_lora_32_V3
test_framework = unity
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions_8mb.csv
board_build.littlefs_partition = storage
extra_scripts = pre:compress_assets.py
build_flags =
    ${env.build_flags}
    -DBOARD_HELTEC_LORA32_V3
    ; -DOTA_AUTH_TOKEN=\"your-secret-token\"

; ── ESP8266 (Wemos D1 Mini) ──────────────────────────────────────────────────
;
; FIX: The original had a nested `build_flags =` inside the [env:d1_mini]
; build_flags block.  PlatformIO treats the second assignment as a new key,
; silently discarding the first — meaning -DBATTERY_R_TOP etc. were never
; passed to the compiler.  All defines are now in a single flat list.
;
; Source lives in src-d1/ to keep it separate from the IDF src/ tree.
; Both targets share data/ for the web UI.
;
; Library notes:
;   ESPAsyncWebServer + ESPAsyncTCP: me-no-dev originals — the only versions
;   that reliably support ESP8266 Arduino 3.x without symbol conflicts.
;   DNSServer is bundled with the ESP8266 Arduino core — no lib_dep needed.

[env:d1_mini]
platform = espressif8266@^4.2.1
framework = arduino
board = d1_mini
monitor_speed = 74880
monitor_filters = default
board_build.filesystem = littlefs
test_framework = unity
extra_scripts = pre:compress_assets.py
build_src_filter =
    -<*> +<../src-d1/>
    +<../components/qrcodegen/cpp/>

lib_deps =
    me-no-dev/ESPAsyncTCP@^1.2.2
    me-no-dev/ESPAsyncWebServer@^1.2.3
    bblanchon/ArduinoJson@^6.21.0
    olikraus/U8g2@^2.34.0

; FIX: single build_flags block — battery voltage divider defines are now
; actually applied.  Adjust R_TOP/R_BOT for your hardware voltage divider.
; A 100k/100k divider on A0 gives a 0–3.3V range for a 2S LiPo (6–8.4V)
; — replace with your actual resistor values.
build_flags =
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -Wno-deprecated-declarations
    -I ${PROJECT_DIR}/components/qrcodegen/cpp
    -D BATTERY_R_TOP=100000
    -D BATTERY_R_BOT=100000
    -D BATTERY_V_EMPTY_MV=3200
    -D BATTERY_V_FULL_MV=4200
    ; Uncomment to enable SSD1306 OLED (requires U8g2 — already in lib_deps):
    ; -D HAS_OLED
    ; Uncomment and set to enforce X-OTA-Token header on OTA endpoints:
    ; -D OTA_AUTH_TOKEN=\"your-secret-token\"

; ── ESP32 (TTGO LoRa32 V1) ───────────────────────────────────────────────────

[env:ttgo_lora32_v1]
board = ttgo-lora32-v1
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions_4mb.csv
board_build.littlefs_partition = storage
test_framework = unity
build_flags =
    ${env.build_flags}
    -DBOARD_TTGO_LORA32_V1
    ; -DOTA_AUTH_TOKEN=\"your-secret-token\"
