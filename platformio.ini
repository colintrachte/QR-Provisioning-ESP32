; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; sdkconfig.defaults — framework, silicon, driver settings (I2C, flash, WebSocket).
; config.h           — application constants baked in at compile time.
; Do NOT put config values (-DCONFIG_*) in build_flags — IDF ignores them here.
;
; Environments
;   robot_esp32   Heltec WiFi LoRa 32 V3 (ESP32-S3) — ESP-IDF 5.x, full firmware
;   d1_mini       Wemos D1 Mini (ESP8266) — Arduino framework, shared web UI

[platformio]
default_envs = robot_esp32
data_dir = data

; ── Shared web UI upload ─────────────────────────────────────────────────────
; Both targets serve the same data/ directory (index.html / style.css /
; script.js). Use `pio run -e <env> -t uploadfs` to flash for each target.

; ── ESP32-S3 (Heltec WiFi LoRa 32 V3) ───────────────────────────────────────

[env]
platform = espressif32@^6.9.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:robot_esp32]
board = heltec_wifi_lora_32_V3
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.littlefs_partition = storage

build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -Werror=deprecated-declarations
    -Wno-error=return-type
    ; ── Intentionally no -DCONFIG_* flags here ───────────────────────────────
    ; LittleFS Kconfig values live in sdkconfig.defaults.
    ; Application constants live in config.h.

; ── ESP8266 (Wemos D1 Mini) ──────────────────────────────────────────────────
;
; Source lives in src-d1/ to keep it separate from the IDF src/ tree.
; Both targets share data/ — uploadfs sends the same index.html/css/js.
;
; Library notes:
;   ESPAsyncWebServer + ESPAsyncTCP: me-no-dev originals, the only versions
;   that reliably support ESP8266 Arduino 3.x without symbol conflicts.
;   DNSServer is bundled with the ESP8266 Arduino core — no lib_dep needed.

[env:d1_mini]
platform = espressif8266@^4.2.1
framework = arduino
board = d1_mini
monitor_speed = 74880          ; matches ESP8266 boot ROM baud rate
monitor_filters = default

board_build.filesystem = littlefs

; Point PlatformIO at the D1 Mini source tree
build_src_filter = -<*> +<../src-d1/>

lib_deps =
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/ESPAsyncTCP@^1.2.2

build_flags =
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -Wno-deprecated-declarations
