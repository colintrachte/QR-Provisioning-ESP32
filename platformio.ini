[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = espidf
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

lib_deps =
    https://github.com/nayuki/QR-Code-generator.git
    https://github.com/olikraus/u8g2.git
    https://github.com/mkfrey/u8g2-hal-esp-idf.git

build_flags =
    -DBOARD_HAS_PSRAM

; You still need this if you have custom local components
; that aren't managed by the YAML file.
board_build.cmake_extra_args =
    -DEXTRA_COMPONENT_DIRS=${PROJECT_DIR}/components
