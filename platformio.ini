; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = tractor_esp32
data_dir = data

[env]
platform = espressif32@^6.9.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:tractor_esp32]
board = heltec_wifi_lora_32_V3
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.littlefs_partition = storage
build_flags =
    ${env.build_flags}
    -DNET_CONNECTION_KEY=\"Tractor_Alpha\"
    -DNET_SERVER_PORT=4211
    -DNET_TIMEOUT_MS=300
    -DPROV_SECURITY_POP=\"mulebot\"
    -DMOTOR_DEADBAND_DEFAULT=0.02f
    -DMOTOR_SPEED_LIMIT_DEFAULT=1.0f
    -DMOTOR_RAMP_UP_RATE=6.0f
    -DMOTOR_RAMP_DOWN_RATE=14.0f
    -DMOTOR_RAMP_ESTOP_RATE=40.0f
    -DNET_DEVICE_NAME_DEFAULT=\"MuleBot\"
    -DCONFIG_DEBUG_SERIAL=1
    -DNET_MDNS_ENABLE=0
    -DCORE_DEBUG_LEVEL=3
    -Werror=deprecated-declarations
    # LittleFS Kconfig values are in sdkconfig.defaults, not here.
    # -DCONFIG_LITTLEFS_* flags are ignored by the IDF component build system.
    -Wno-error=return-type
