; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = tractor_esp32
; data_dir must be here (global), not in [env:...], or PlatformIO ignores it
; and `pio run -t uploadfs` will not find the web files.
data_dir = data

[env]
; Pin to 6.x+ which correctly maps heltec_wifi_lora_32_V3 to ESP32-S3.
; Older espressif32 releases targeted the original ESP32 for this board ID,
; causing GPIO validation to fail at boot because S3 pin numbers were
; validated against the ESP32's smaller GPIO range.
platform = espressif32@^6.9.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:tractor_esp32]
board = heltec_wifi_lora_32_V3
upload_speed = 921600

; ── LittleFS web files ───────────────────────────────────────────────────────
; After editing any file in data/, run:
;   pio run -t uploadfs
; to flash the filesystem image without reflashing firmware.
;
; data/setup.html  setup.css  setup.js  — captive portal UI
; data/index.html  style.css  script.js — robot control UI
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; Tell the LittleFS builder which partition label to target.
; Must match the label column in partitions.csv exactly.
board_build.spiffs_partition = storage

build_flags =
    ${env.build_flags}
    ; ── Network ──────────────────────────────────────────────────────
    -DNET_CONNECTION_KEY=\"Tractor_Alpha\"
    -DNET_SERVER_PORT=4211
    -DNET_TIMEOUT_MS=300
    ; ── Provisioning ─────────────────────────────────────────────────
    -DPROV_SECURITY_POP=\"mulebot\"
    ; ── Motor defaults ───────────────────────────────────────────────
    -DMOTOR_DEADBAND_DEFAULT=0.02f
    -DMOTOR_SPEED_LIMIT_DEFAULT=1.0f
    -DMOTOR_RAMP_UP_RATE=6.0f
    -DMOTOR_RAMP_DOWN_RATE=14.0f
    -DMOTOR_RAMP_ESTOP_RATE=40.0f
    ; ── Device identity ──────────────────────────────────────────────
    -DNET_DEVICE_NAME_DEFAULT=\"MuleBot\"
    ; ── Debug ────────────────────────────────────────────────────────
    -DCONFIG_DEBUG_SERIAL=1
    -DNET_MDNS_ENABLE=0
    -DCORE_DEBUG_LEVEL=3
    -Werror=deprecated-declarations

lib_deps =
    https://github.com/nayuki/QR-Code-generator#master
